<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="AurisLeft">
  <defs>
    <linearGradient id="al-bg" x1="32" y1="20" x2="228" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0B35A"/>
      <stop offset="48%" stop-color="#E8A54B"/>
      <stop offset="100%" stop-color="#9B8CFF"/>
    </linearGradient>
    <linearGradient id="al-sheen" x1="64" y1="28" x2="180" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="al-ear" x1="88" y1="56" x2="176" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF8EF"/>
      <stop offset="100%" stop-color="#F2E4D0"/>
    </linearGradient>
    <filter id="al-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0C0E12" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#al-bg)" filter="url(#al-soft)"/>
  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#al-sheen)"/>

  <!-- Soft glow disc behind mark -->
  <circle cx="128" cy="132" r="78" fill="#0C0E12" opacity="0.12"/>

  <!-- Stylized left ear (profile facing left = left ear) -->
  <path
    d="M148 58
       C118 54 92 72 84 100
       C76 128 84 152 96 168
       C108 184 118 196 118 210
       C118 220 126 226 136 224
       C148 222 152 210 148 198
       C142 180 138 170 148 156
       C164 136 170 118 166 98
       C162 74 158 60 148 58Z"
    fill="url(#al-ear)"
  />

  <!-- Inner concha / canal -->
  <path
    d="M132 96
       C120 98 112 110 114 124
       C116 138 126 146 138 144
       C146 142 150 134 148 126
       C146 116 140 110 132 112
       C128 114 126 120 128 126"
    stroke="#C98B3E"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.55"
  />

  <!-- Sound waves from the left ear -->
  <path d="M72 108 C60 120 60 144 72 156" stroke="#FFF8EF" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
  <path d="M56 92 C36 114 36 150 56 172" stroke="#FFF8EF" stroke-width="7" stroke-linecap="round" opacity="0.72"/>
  <path d="M42 78 C14 108 14 156 42 186" stroke="#FFF8EF" stroke-width="6" stroke-linecap="round" opacity="0.42"/>

  <!-- Tiny music accent -->
  <circle cx="174" cy="78" r="7" fill="#FFF8EF" opacity="0.95"/>
  <path d="M178 78 V54 C186 50 196 48 202 52 V74" stroke="#FFF8EF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="198" cy="74" r="7" fill="#FFF8EF"/>
</svg>
